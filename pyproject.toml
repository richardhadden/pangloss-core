[tool.poetry]
name = "pangloss-core"
version = "0.1.0"
description = ""
authors = ["Richard Hadden <richard.hadden@oeaw.ac.at>"]
readme = "README.md"
packages = [{include = "pangloss_core"}]

[tool.poetry.dependencies]
python = "^3.12"
annotated-types = "^0.5.0"
pydantic = "^2.2.1"
neo4j = "^5.16.0"
pyhumps = "^3.8.0"


[tool.poetry.group.dev.dependencies]
icecream = "^2.1.3"
pytest = "^7.4.0"
black = "^23.7.0"
pyright = "^1.1.323"
pylint-pydantic = "^0.3.2"
datamodel-code-generator = "^0.25.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[mypy]
plugins = ["pydantic.mypy"]